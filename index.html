<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Status</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="auth-screen" class="screen">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 168 168" width="64" height="64">
          <path fill="#1ED760" d="M84 0C37.6 0 0 37.6 0 84s37.6 84 84 84 84-37.6 84-84S130.4 0 84 0zm38.6 121.2c-1.5 2.5-4.8 3.3-7.3 1.8-20-12.2-45.1-15-74.8-8.2-2.9.7-5.7-1.1-6.4-3.9-.7-2.9 1.1-5.7 3.9-6.4 32.4-7.4 60.2-4.2 82.7 9.5 2.5 1.5 3.3 4.7 1.9 7.2zm10.3-22.9c-1.9 3.1-6 4.1-9.1 2.2-22.9-14.1-57.8-18.1-84.9-9.9-3.5 1.1-7.2-.9-8.3-4.4-1.1-3.5.9-7.2 4.4-8.3 30.9-9.4 69.4-4.8 95.7 11.3 3.1 1.9 4.1 6 2.2 9.1zm.9-23.8c-27.5-16.3-72.9-17.8-99.2-9.9-4.2 1.3-8.7-1.1-10-5.3-1.3-4.2 1.1-8.7 5.3-10 30.1-9.1 80.2-7.4 111.9 11.4 3.8 2.3 5.1 7.2 2.8 11-.7 1.2-2.4 3.2-5.3 3.2-1.8 0-3.7-.5-5.5-1.4z"/>
        </svg>
        <h1>Spotify Status</h1>
      </div>
      <p class="subtitle">Share what you're listening to</p>
      <button id="connect-btn" onclick="startAuth()">Connect with Spotify</button>
      <p class="setup-hint">
        Need a Client ID? <a href="https://developer.spotify.com/dashboard" target="_blank">Create a Spotify app</a>
        and set the redirect URI to this page's URL.
      </p>
    </div>

    <div id="player-screen" class="screen hidden">
      <div class="now-playing-label">Now Playing</div>
      <div id="track-card" class="track-card">
        <div id="not-playing" class="not-playing hidden">
          <div class="not-playing-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
          </div>
          <p>Nothing playing right now</p>
        </div>
        <div id="playing" class="hidden">
          <div class="album-art-wrapper">
            <img id="album-art" src="" alt="Album Art" />
            <div id="playing-indicator" class="playing-indicator">
              <span></span><span></span><span></span>
            </div>
          </div>
          <div class="track-info">
            <div id="track-name" class="track-name"></div>
            <div id="artist-name" class="artist-name"></div>
            <div id="album-name" class="album-name"></div>
            <div class="progress-container">
              <span id="progress-time" class="time">0:00</span>
              <div class="progress-bar-bg">
                <div id="progress-bar" class="progress-bar"></div>
              </div>
              <span id="duration-time" class="time">0:00</span>
            </div>
          </div>
        </div>
      </div>
      <button id="disconnect-btn" onclick="disconnect()">Disconnect</button>
    </div>

    <div id="error-screen" class="screen hidden">
      <p id="error-message" class="error-message"></p>
      <button onclick="showAuthScreen()">Try Again</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
