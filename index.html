<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Status</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="bg-a" class="bg-layer"></div>
  <div id="bg-b" class="bg-layer"></div>
  <div class="bg-vignette"></div>

  <!-- Lyrics overlay — fixed, top-right, blurred, not clickable -->
  <div id="lyrics-overlay" class="lyrics-overlay">
    <div id="lyrics-scroll"></div>
  </div>

  <div id="app">

    <!-- Loading / redirecting to Spotify -->
    <div id="loading-screen" class="screen">
      <div class="spinner"></div>
    </div>

    <!-- Player -->
    <div id="player-screen" class="screen hidden">

      <div id="not-playing" class="not-playing hidden">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
        <p>Nothing playing right now</p>
      </div>

      <div id="playing" class="player-card hidden">
        <a id="spotify-link" class="disc-link" href="#" target="_blank" rel="noopener" aria-label="Open in Spotify">
          <div id="disc" class="disc">
            <img id="album-art" src="" alt="Album art" />
            <div class="disc-hole"></div>
          </div>
        </a>

        <div class="track-info">
          <div class="now-playing-pill">
            <span id="bars" class="bars hidden"><i></i><i></i><i></i><i></i></span>
            Now Playing
          </div>
          <div class="marquee-wrap" id="track-wrap">
            <div id="track-name" class="track-name"></div>
          </div>
          <div class="marquee-wrap" id="artist-wrap">
            <div id="artist-name" class="artist-name"></div>
          </div>
          <div id="album-name" class="album-name"></div>
          <div class="progress-row">
            <span id="progress-time" class="time">0:00</span>
            <div class="progress-bg">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
            <span id="duration-time" class="time right">0:00</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Error -->
    <div id="error-screen" class="screen hidden">
      <p id="error-message" class="error-msg"></p>
      <button onclick="startAuth()">Try Again</button>
    </div>

  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
